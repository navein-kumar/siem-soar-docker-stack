## Report Engine v2 - Production (Docker Hub images)
## Usage:
##   docker-compose pull && docker-compose up -d
##
## First-time setup:
##   curl -X PUT "http://localhost:8447/api/templates/bulk/company" \
##     -H "Content-Type: application/json" \
##     -d '{"description":"Your Company","client_address":"City, Country","logo_url":"https://..."}'
##
## Access: http://your-server:8447

services:
  backend:
    image: navinkr431/report-engine-backend:v2.0
    container_name: report-engine-api
    volumes:
      - ./data:/app/data
      - ./reports:/app/reports
    environment:
      - OPENSEARCH_URL=https://your-opensearch:9200
      - OPENSEARCH_USER=admin
      - OPENSEARCH_PASS=your-password
      - OPENSEARCH_INDEX=wazuh-alerts-*
      - GOTENBERG_URL=http://gotenberg:3000
      - CLEANUP_SCHEDULE=weekly
    depends_on:
      - gotenberg
    restart: unless-stopped

  gotenberg:
    image: gotenberg/gotenberg:8
    container_name: report-engine-gotenberg
    restart: unless-stopped

  nginx:
    image: navinkr431/report-engine-frontend:v2.0
    container_name: report-engine-web
    ports:
      - "8447:80"
    depends_on:
      - backend
    restart: unless-stopped
