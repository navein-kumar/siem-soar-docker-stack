services:
  # ── Cassandra (TheHive database) ──
  cassandra:
    image: cassandra:4.1
    hostname: cassandra
    restart: unless-stopped
    mem_limit: 2048m
    environment:
      - MAX_HEAP_SIZE=1024M
      - HEAP_NEWSIZE=256M
      - CASSANDRA_CLUSTER_NAME=thp
    volumes:
      - ./data/cassandra/data:/var/lib/cassandra
      - ./data/cassandra/logs:/var/log/cassandra

  # ── Elasticsearch (TheHive backend) ──
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:7.17.15
    hostname: elasticsearch
    restart: unless-stopped
    mem_limit: 2048m
    environment:
      - discovery.type=single-node
      - cluster.name=hive
      - http.host=0.0.0.0
      - transport.host=0.0.0.0
      - xpack.security.enabled=false
      - bootstrap.memory_lock=true
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
      memlock:
        soft: -1
        hard: -1
    volumes:
      - ./data/elasticsearch/data:/usr/share/elasticsearch/data
      - ./data/elasticsearch/logs:/usr/share/elasticsearch/logs

  # ── MinIO S3 Storage (TheHive file storage) ──
  minio:
    image: minio/minio:latest
    hostname: minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    volumes:
      - ./data/minio:/data

  # ── TheHive 5 ──
  thehive:
    image: strangebee/thehive:5.2
    hostname: thehive
    restart: unless-stopped
    depends_on:
      - cassandra
      - elasticsearch
      - minio
    mem_limit: 2048m
    environment:
      - JVM_OPTS=-Xms1024M -Xmx1024M
    command:
      - --secret
      - thehive1234
      - --cql-hostnames
      - cassandra
      - --index-backend
      - elasticsearch
      - --es-hostnames
      - elasticsearch
      - --s3-endpoint
      - http://minio:9000
      - --s3-access-key
      - minioadmin
      - --s3-secret-key
      - minioadmin
      - --s3-use-path-access-style
    volumes:
      - ./data/thehive/data:/opt/thp/thehive/data
      - ./data/thehive/files:/opt/thp/thehive/files
      - ./data/thehive/index:/opt/thp/thehive/index
      - ./data/thehive/logs:/var/log/thehive

  # ── Nginx SSL Reverse Proxy (TheHive only) ──
  nginx:
    image: nginx:alpine
    hostname: nginx-hive
    restart: unless-stopped
    ports:
      - "8444:8444"
    volumes:
      - ./config/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./config/nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - thehive

# Access URL:
# TheHive:  https://<IP>:8444  (admin@thehive.local / secret)
