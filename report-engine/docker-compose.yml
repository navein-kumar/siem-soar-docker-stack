services:
  report-engine:
    build: .
    container_name: report-engine
    volumes:
      - ./engine.py:/app/engine.py
      - ./config:/app/config
      - ./templates:/app/templates
      - ./output:/app/output
    # Connect to wazuh network for dashboard access
    networks:
      - wazuh_network
      - gotenberg_network
    # Override CMD to keep container running for manual execution
    entrypoint: ["tail", "-f", "/dev/null"]
    restart: unless-stopped
    shm_size: '1gb'

  gotenberg:
    image: gotenberg/gotenberg:8
    container_name: gotenberg
    restart: unless-stopped
    networks:
      - gotenberg_network
    shm_size: '1gb'
    command:
      - "gotenberg"
      - "--api-timeout=120s"
      - "--chromium-max-queue-size=50"

networks:
  wazuh_network:
    external: true
    name: wazuh-stack-single-node_default
  gotenberg_network:
    driver: bridge
