<div class="page">
  <div class="hdr"><h2>Table of Contents</h2><p>Report sections overview</p></div>
  <div style="padding:20px 30px">
    {% for section in sections %}
    <div style="border-bottom:1px dashed #ecf0f1;padding:10px 0;display:flex;justify-content:space-between;font-size:11px">
      <span style="font-weight:700;color:#1a1a2e">{{ loop.index }}. {{ section.name }}</span>
      <span style="color:#95a5a6">Dashboard screenshot</span>
    </div>
    {% endfor %}
  </div>
</div>
