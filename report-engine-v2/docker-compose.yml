## Report Engine v2.1 - Production (Docker Hub images)
##
## Quick Start:
##   docker-compose pull && docker-compose up -d
##
## First-time setup — update company details:
##   curl -X PUT "http://localhost:8447/api/templates/bulk/company" \
##     -H "Content-Type: application/json" \
##     -d '{"description":"Your Company","client_address":"City, Country","logo_url":"https://..."}'
##
## UI Login:   admin / SecretPassword@123  (configurable via UI_USER/UI_PASS)
## API Access:  No auth required (for N8N, curl, external tools)
## URL:         http://your-server:8447

services:
  backend:
    image: navinkr431/report-engine-backend:v2.1
    container_name: report-engine-api
    volumes:
      - ./data:/app/data
      - ./reports:/app/reports
    environment:
      - OPENSEARCH_URL=https://your-opensearch:9200
      - OPENSEARCH_USER=admin
      - OPENSEARCH_PASS=your-password
      - OPENSEARCH_INDEX=wazuh-alerts-*
      - GOTENBERG_URL=http://gotenberg:3000
      - EXCEL_MAX_ROWS=200000
      - REQUEST_TIMEOUT=600
      - CLEANUP_SCHEDULE=weekly
    depends_on:
      - gotenberg
    restart: unless-stopped

  gotenberg:
    image: gotenberg/gotenberg:8
    container_name: report-engine-gotenberg
    restart: unless-stopped

  nginx:
    image: navinkr431/report-engine-frontend:v2.2
    container_name: report-engine-web
    ports:
      - "8447:443"
      # - "8080:80"  # Uncomment to enable HTTP
    environment:
      - UI_USER=admin
      - UI_PASS=SecretPassword@123
      - SSL_ENABLED=true
    volumes:
      - ssl-certs:/etc/nginx/ssl
      - ./frontend/entrypoint.sh:/entrypoint.sh:ro
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  ssl-certs:
