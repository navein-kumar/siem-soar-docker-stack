services:
  backend:
    build: ./backend
    container_name: report-engine-api
    volumes:
      - ./data:/app/data
      - ./reports:/app/reports
    environment:
      - OPENSEARCH_URL=https://wazuh.indexer:9200
      - OPENSEARCH_USER=admin
      - OPENSEARCH_PASS=SecretPassword@123
      - OPENSEARCH_INDEX=wazuh-alerts-*
      - GOTENBERG_URL=http://gotenberg:3000
    networks:
      - default
      - wazuh-network
    restart: unless-stopped

  gotenberg:
    image: gotenberg/gotenberg:8
    container_name: report-engine-gotenberg
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: report-engine-web
    ports:
      - "8447:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    restart: unless-stopped

networks:
  wazuh-network:
    external: true
    name: wazuh-n8n-singlenode_default
