<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>{{ client_name }} - Security Report</title>
<style>
@page { size: A4 portrait; margin: 0; }
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Segoe UI', Arial, sans-serif;
  font-size: 9px;
  color: #2c3e50;
  background: #fff;
  counter-reset: page;
}
.page {
  page-break-after: always;
  width: 210mm;
  min-height: 297mm;
  padding: 20px 24px 40px;
  position: relative;
  counter-increment: page;
}
.page:last-child { page-break-after: auto; }
.hdr {
  background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
  color: #fff;
  padding: 12px 20px;
  border-radius: 8px;
  margin-bottom: 14px;
}
.hdr h2 { font-size: 15px; font-weight: 700; margin-bottom: 2px; }
.hdr p { font-size: 8px; opacity: 0.8; }
.section-img {
  width: 100%;
  border-radius: 8px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  border: 1px solid #ecf0f1;
}
</style>
</head>
<body>
{{ content|safe }}
</body>
</html>
